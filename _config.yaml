title: Fourier-GRX-HXC Documentation
description: HXC 机器人运行、配置与打包文档
remote_theme: just-the-docs/just-the-docs
baseurl: "/fourier-grx-HXC"

plugins:
  - jekyll-relative-links
  - jekyll-remote-theme
  - jekyll-seo-tag

relative_links:
  enabled: true
  collections: true

search_enabled: true
collapse_navigation: true
navigation_fixed: true
navigation_sticky: true
heading_anchors: true
back_to_top: true
back_to_top_text: "返回顶部"
footer_content: "Copyright &copy; Fourier Intelligence"

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

markdown: kramdown
kramdown:
  auto_ids: true
  toc_levels: 1..3
  syntax_highlighter: rouge
